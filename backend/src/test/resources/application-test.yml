# Testcontainers PostgreSQL — ana application.properties yüklenir, bu dosya ekler/üst yazar
#
# Boş DB: Flyway betikleri çoğunlukla ALTER (tablo Hibernate ile hiç oluşmamış prod geçmişi varsayar);
# entegrasyon testinde şema entity'lerden üretilir/güncellenir (ddl-auto: update), Flyway kapalıdır.
spring:
  task:
    scheduling:
      enabled: false
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: localhost
    port: 3025

app:
  jwt:
    secret: test-jwt-secret-min-32-chars-long!!
  payment:
    mode: demo

tiempos:
  pre-session-demo: true
