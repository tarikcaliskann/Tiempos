# Yerel geliştirme: SPRING_PROFILES_ACTIVE=local (kök .env veya docker compose api)
spring.jpa.hibernate.ddl-auto=update
tiempos.schema-patch.enabled=true
tiempos.pre-session-demo=true
app.google.require-client-id=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.payment.mode=demo
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,https://www.tiempos.site,https://tiempos.site}
