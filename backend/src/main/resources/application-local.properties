# Yerel geliştirme: SPRING_PROFILES_ACTIVE=local (kök .env veya docker compose api)
spring.jpa.hibernate.ddl-auto=update
tiempos.schema-patch.enabled=true
tiempos.pre-session-demo=true
app.google.require-client-id=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.payment.mode=demo
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://www.tiempos.site,https://tiempos.site}
app.cors.browser-dev-patterns=${APP_CORS_BROWSER_DEV_PATTERNS:true}
# SMTP kapalıyken mobil/web doğrulama: yeniden gönder yanıtında kod JSON ile döner (yalnızca local).
app.auth.expose-resend-code=true
