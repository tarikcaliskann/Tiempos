spring.application.name=timebank-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
tiempos.schema-patch.enabled=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.enabled=true
spring.flyway.out-of-order=true

management.endpoints.web.exposure.include=health,info
management.health.mail.enabled=false
spring.docker.compose.enabled=false

server.tomcat.max-http-form-post-size=25MB
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=120

# Google OAuth (social login — ID token aud doğrulaması; frontend VITE_GOOGLE_CLIENT_ID ile aynı olmalı)
app.google.client-id=${GOOGLE_CLIENT_ID:}

app.public-base-url=${APP_PUBLIC_BASE_URL:https://www.tiempos.site}
# İletişim formu mesajlarının gideceği gelen kutusu (SMTP açıkken)
app.contact.inbox=${APP_CONTACT_INBOX:tiempos.site@gmail.com}
app.mail.from=${APP_MAIL_FROM:}
# Brevo Transactional HTTP (HTTPS). İletişim formu önce bunu dener; değer SMTP xsmtpsib- şifresinden farklıdır (API keys).
# Brevo: SMTP & API → API keys → Create (Transactional e-posta izni). Render: BREVO_API_KEY
brevo.api-key=${BREVO_API_KEY:}
# true: SMTP hatası kayıt/yeniden gönderimde HTTP 503 (önerilmez). false: kayıt tamamlanır, hata loglanır.
app.mail.strict-errors=${APP_MAIL_STRICT_ERRORS:false}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

# Ödeme: demo = simüle; redirect = PSP URL şablonu ({sessionId}, {amountTry}, {packageId})
# Şablon boşsa redirect modu da demo gibi davranır (CreditPurchaseService).
# Canlı: PAYMENT_MODE=redirect + PAYMENT_REDIRECT_URL_TEMPLATE dolu olmalı.
app.payment.mode=${PAYMENT_MODE:redirect}
app.payment.redirect-url-template=${PAYMENT_REDIRECT_URL_TEMPLATE:}

# CORS — virgülle ayrılmış origin veya desen (Spring allowedOriginPatterns).
# Flutter web / LAN desenleri CorsConfig içinde birleştirilir (properties’te [*] parse riski).
# Sıkı prod: APP_CORS_BROWSER_DEV_PATTERNS=false (Vite/LAN desenleri kapanır; Flutter :9339 her zaman açık).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://www.tiempos.site,https://tiempos.site}
app.cors.browser-dev-patterns=${APP_CORS_BROWSER_DEV_PATTERNS:true}

app.google.require-client-id=${GOOGLE_REQUIRE_CLIENT_ID:false}
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}

app.rate-limit.login-per-minute=${RATE_LIMIT_LOGIN_PER_MINUTE:20}
app.rate-limit.contact-per-minute=${RATE_LIMIT_CONTACT_PER_MINUTE:8}
app.rate-limit.messages-per-minute=${RATE_LIMIT_MESSAGES_PER_MINUTE:90}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
# app.mail.enabled=true|false — zorla aç/kapat (yoksa host + kimlik bilgisine bakılır)
# app.mail.from=Tiempos <noreply@dogrulanmis-domain.com>  (Brevo/SendGrid'de doğrulanmış gönderici)
#
# Canlı (Render): Brevo — SPRING_MAIL_HOST=smtp-relay.brevo.com, SMTP key, APP_MAIL_FROM doğrulanmış gönderici
# Yerel Gmail Render’dan çalışmaz; .env.example içinde Brevo şablonu var
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=25000
spring.mail.properties.mail.smtp.timeout=25000
spring.mail.properties.mail.smtp.writetimeout=25000
# Brevo / harici SMTP TLS (host boşsa etkisiz)
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_HOST:}

# Seans onayı: false = yalnızca başlangıca ~10 dk kala. Yerelde true için profile local veya TIEMPOS_PRE_SESSION_DEMO=true
tiempos.pre-session-demo=${TIEMPOS_PRE_SESSION_DEMO:false}