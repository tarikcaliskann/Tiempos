<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <script>
      (function () {
        try {
          var k = "tiempos-theme";
          var stored = localStorage.getItem(k);
          var root = document.documentElement;
          if (stored === "light") root.classList.remove("dark");
          else root.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google GSI postMessage: Vite server.headers ile birlikte; bazı ortamlarda yalnızca meta etkili olur -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="unsafe-none" />
    <meta name="application-name" content="Tiempos" />
    <title>Tiempos</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Global portallar (#root stacking / overflow’dan bağımsız) -->
    <div id="tiempos-overlays"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
