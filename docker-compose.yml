# Kullanım: docker compose up --build
# Arayüz: http://localhost:3000  (nginx → /api → api:8080)
# API doğrudan: http://localhost:8080
#
# Tüm hesapları DB'den silmek (sıfırdan kayıt): ./scripts/reset-timebank-data.sh  (db çalışırken)
#
# E-posta: .env içinde Brevo (canlı + yerel test). Render’da aynı SPRING_MAIL_* değerleri.
# Yerel Mailpit: SPRING_MAIL_HOST=mailpit, PORT=1025, auth=false (.env.example).

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: tiempos-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  db:
    image: postgres:16-alpine
    container_name: tiempos-postgres
    environment:
      POSTGRES_USER: timebank_user
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: timebank

    ports:
      - "5433:5432"
    volumes:
      - timebank_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timebank_user -d timebank"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tiempos-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/timebank
      SPRING_DATASOURCE_USERNAME: timebank_user
      SPRING_DATASOURCE_PASSWORD: "1234"
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:9339,http://127.0.0.1:9339,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-true}
      APP_MAIL_STRICT_ERRORS: ${APP_MAIL_STRICT_ERRORS:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-at-least-32-chars-long}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp-relay.brevo.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_CONTACT_INBOX: ${APP_CONTACT_INBOX:-tiempos.site@gmail.com}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    container_name: tiempos-web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  timebank_pgdata:
